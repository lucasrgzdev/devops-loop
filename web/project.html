<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <a class="back" href="/">← All projects</a>

  <!-- Add ticket modal -->
  <div class="modal-overlay" id="modal-ticket" style="display:none" onclick="if(event.target===this)closeTicketModal()">
    <div class="modal">
      <h2>Add ticket</h2>
      <div class="modal-error" id="ticket-error"></div>
      <form onsubmit="submitAddTicket(event)">
        <div class="form-group">
          <label class="form-label">Title *</label>
          <input class="form-input" id="t-title" required placeholder="short imperative phrase" autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label">Body (optional)</label>
          <textarea class="form-textarea" id="t-body" placeholder="## Goal&#10;One sentence.&#10;&#10;## Acceptance criteria&#10;- [ ]"></textarea>
        </div>
        <div class="btn-row">
          <button type="button" class="btn-secondary" onclick="closeTicketModal()">Cancel</button>
          <button type="submit" class="btn-primary" id="ticket-submit-btn">Add ticket</button>
        </div>
      </form>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="/dashboard.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <rect x="3" y="3" width="8" height="8" rx="1.5"/>
        <rect x="13" y="3" width="8" height="8" rx="1.5"/>
        <rect x="3"  y="13" width="8" height="8" rx="1.5"/>
        <rect x="13" y="13" width="8" height="8" rx="1.5"/>
      </svg>
      <span>Dashboard</span>
    </a>
    <a href="/" class="nav-item active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M3 7a2 2 0 012-2h3.586l2 2H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/>
      </svg>
      <span>Projects</span>
    </a>
  </nav>
  <div id="loading">Loading...</div>

  <div id="content" style="display:none">
    <div class="project-header">
      <div class="project-header-top">
        <h1 id="project-name"></h1>
        <span id="project-badge"></span>
      </div>
      <a id="project-github" href="#" target="_blank"></a>
      <p id="project-desc" class="card-meta" style="margin-top:4px"></p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('brief')">Brief</button>
      <button class="tab-btn" onclick="showTab('tickets')">Tickets <span id="ticket-count" class="tab-count"></span></button>
      <button class="tab-btn" onclick="showTab('runs')">Runs <span id="run-count" class="tab-count"></span></button>
    </div>

    <!-- Brief tab -->
    <div id="tab-brief" class="tab-panel">
      <div id="brief-view">
        <div style="display:flex;justify-content:flex-end;margin-bottom:8px">
          <button class="btn-sm btn-ghost" onclick="startEditBrief()">Edit</button>
        </div>
        <div id="brief-content"></div>
      </div>
      <div id="brief-edit" style="display:none">
        <textarea class="form-textarea" id="brief-textarea" style="min-height:280px"></textarea>
        <div class="brief-edit-bar">
          <button class="btn-sm btn-ghost" onclick="cancelBrief()">Cancel</button>
          <button class="btn-sm btn-primary" onclick="saveBrief()">Save</button>
        </div>
      </div>
      <div id="tree-section" style="display:none">
        <h2 style="margin-top:20px; margin-bottom:8px">Codebase structure</h2>
        <pre id="tree-content" class="tree-box"></pre>
      </div>
    </div>

    <!-- Tickets tab -->
    <div id="tab-tickets" class="tab-panel" style="display:none">
      <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
        <button class="btn-sm btn-primary" onclick="openTicketModal()">+ Add ticket</button>
      </div>
      <div id="tickets-list"></div>
    </div>

    <!-- Runs tab -->
    <div id="tab-runs" class="tab-panel" style="display:none">
      <div id="runs-list"></div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const projectId = params.get('id');
    if (!projectId) document.getElementById('loading').textContent = 'Missing ?id= in URL.';

    marked.setOptions({ breaks: true });

    let _rawBrief = '';
    let _currentTickets = [];

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        closeTicketModal();
        cancelBrief();
      }
    });

    // ── Tabs ────────────────────────────────────────────────────────────────

    function showTab(name) {
      document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + name).style.display = '';
      event.currentTarget.classList.add('active');
    }

    // ── Helpers ─────────────────────────────────────────────────────────────

    const statusBadge = (s) => {
      const map = { active: 'badge-active', paused: 'badge-paused', done: 'badge-done',
                    open: 'badge-pending', running: 'badge-running' };
      return `<span class="badge ${map[s] ?? 'badge-done'}">${s}</span>`;
    };

    const verdictBadge = (approved) => {
      if (approved === 1)  return '<span class="badge badge-approve">Approved</span>';
      if (approved === -1) return '<span class="badge badge-flagged">Flagged</span>';
      return '<span class="badge badge-pending">Pending</span>';
    };

    const fmtDate = (iso) => {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' })
           + ' ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
    };

    const escHtml = (s) => s
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    // ── Render ───────────────────────────────────────────────────────────────

    function renderBrief(brief, tree) {
      _rawBrief = brief || '';
      const el = document.getElementById('brief-content');
      el.innerHTML = brief
        ? `<div class="md-body">${marked.parse(brief)}</div>`
        : '<p class="empty">No brief.md yet — hit Edit to write one.</p>';
      if (tree) {
        document.getElementById('tree-section').style.display = '';
        document.getElementById('tree-content').textContent = tree;
      }
    }

    // ── Brief edit ───────────────────────────────────────────────────────────

    function startEditBrief() {
      document.getElementById('brief-textarea').value = _rawBrief;
      document.getElementById('brief-view').style.display = 'none';
      document.getElementById('brief-edit').style.display  = '';
      document.getElementById('brief-textarea').focus();
    }

    function cancelBrief() {
      document.getElementById('brief-view').style.display = '';
      document.getElementById('brief-edit').style.display  = 'none';
    }

    async function saveBrief() {
      const content = document.getElementById('brief-textarea').value;
      try {
        const res = await fetch(`/api/projects/${projectId}/brief`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content }),
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        _rawBrief = content;
        document.getElementById('brief-content').innerHTML = content
          ? `<div class="md-body">${marked.parse(content)}</div>`
          : '<p class="empty">No brief.md yet — hit Edit to write one.</p>';
        cancelBrief();
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    function renderTickets(tickets) {
      _currentTickets = tickets;
      document.getElementById('ticket-count').textContent = tickets.length || '';
      const el = document.getElementById('tickets-list');
      if (!tickets.length) {
        el.innerHTML = '<p class="empty">No tickets yet. Hit + Add ticket to create one.</p>';
        return;
      }
      el.innerHTML = '';
      for (const t of tickets) {
        const card = document.createElement('div');
        card.className = 'ticket-card';
        card.dataset.filename = t.filename;
        const badge = t.is_running ? statusBadge('running') : statusBadge(t.status);
        const runBtn = t.is_running
          ? `<button class="btn-run" disabled>Running…</button>`
          : `<button class="btn-run" data-filename="${escHtml(t.filename)}"
               onclick="event.stopPropagation(); runTicket(this.dataset.filename, this)">Run</button>`;
        card.innerHTML = `
          <div class="ticket-header" onclick="toggleTicket(this)">
            <div class="ticket-header-left">
              <span class="ticket-name">${escHtml(t.filename)}</span>
              ${badge}
            </div>
            <div class="ticket-header-right">
              ${runBtn}
              <span class="chevron">▶</span>
            </div>
          </div>
          <div class="ticket-body" style="display:none">
            <div class="md-body">${marked.parse(t.content)}</div>
            <div class="btn-row" style="margin-top:12px">
              <button class="btn-sm btn-ghost"
                data-filename="${escHtml(t.filename)}"
                onclick="deleteTicket(this.dataset.filename, this)">Delete ticket</button>
            </div>
          </div>
        `;
        el.appendChild(card);
      }
    }

    // ── Ticket modal ─────────────────────────────────────────────────────────

    function openTicketModal() {
      document.getElementById('ticket-error').textContent = '';
      document.getElementById('t-title').value = '';
      document.getElementById('t-body').value  = '';
      document.getElementById('ticket-submit-btn').disabled = false;
      document.getElementById('ticket-submit-btn').textContent = 'Add ticket';
      document.getElementById('modal-ticket').style.display = 'flex';
      document.getElementById('t-title').focus();
    }

    function closeTicketModal() {
      document.getElementById('modal-ticket').style.display = 'none';
    }

    async function submitAddTicket(e) {
      e.preventDefault();
      const errEl = document.getElementById('ticket-error');
      errEl.textContent = '';
      const btn = document.getElementById('ticket-submit-btn');
      btn.disabled = true;
      btn.textContent = 'Adding…';
      try {
        const res = await fetch(`/api/projects/${projectId}/tickets`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            title: document.getElementById('t-title').value.trim(),
            body:  document.getElementById('t-body').value.trim(),
          }),
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        closeTicketModal();
        renderTickets([..._currentTickets, data]);
        document.querySelectorAll('.tab-btn')[1].click();
      } catch (err) {
        errEl.textContent = err.message;
        btn.disabled = false;
        btn.textContent = 'Add ticket';
      }
    }

    async function deleteTicket(filename, btn) {
      if (btn.dataset.confirm !== 'true') {
        btn.dataset.confirm = 'true';
        btn.textContent = 'Sure?';
        btn.classList.add('btn-danger');
        setTimeout(() => {
          if (btn.dataset.confirm === 'true') {
            btn.dataset.confirm = '';
            btn.textContent = 'Delete ticket';
            btn.classList.remove('btn-danger');
          }
        }, 3000);
        return;
      }
      btn.disabled = true;
      try {
        const res = await fetch(
          `/api/projects/${projectId}/tickets/${encodeURIComponent(filename)}`,
          { method: 'DELETE' },
        );
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        renderTickets(_currentTickets.filter(t => t.filename !== filename));
      } catch (err) {
        alert('Error: ' + err.message);
        btn.disabled = false;
      }
    }

    function toggleTicket(header) {
      const body = header.nextElementSibling;
      const chevron = header.querySelector('.chevron');
      const open = body.style.display !== 'none';
      body.style.display = open ? 'none' : '';
      chevron.textContent = open ? '▶' : '▼';
    }

    function renderRuns(runs) {
      document.getElementById('run-count').textContent = runs.length || '';
      const el = document.getElementById('runs-list');
      if (!runs.length) {
        el.innerHTML = '<p class="empty">No runs yet.<br>Run a ticket with scripts/run.py</p>';
        return;
      }
      for (const run of runs) {
        el.appendChild(buildRunCard(run));
      }
    }

    // ── Polling ─────────────────────────────────────────────────────────────

    let _pollTimer = null;
    let _pollRunCount = 0;

    function startPolling() {
      if (_pollTimer) return;
      _pollRunCount = document.querySelectorAll('.run-card').length;
      _pollTimer = setInterval(async () => {
        try {
          const res = await fetch(`/api/projects/${projectId}/runs`);
          const data = await res.json();
          if (!data.tickets) return;
          const anyRunning = data.tickets.some(t => t.is_running);
          if (data.runs.length > _pollRunCount || !anyRunning) {
            stopPolling();
            renderTickets(data.tickets);
            renderRuns(data.runs);
            if (data.runs.length > _pollRunCount) {
              document.querySelectorAll('.tab-btn')[2].click();
            }
          }
        } catch (_) {}
      }, 3000);
    }

    function stopPolling() {
      clearInterval(_pollTimer);
      _pollTimer = null;
    }

    async function runTicket(filename, btn) {
      btn.disabled = true;
      btn.textContent = 'Running…';
      const badge = btn.closest('.ticket-card').querySelector('.badge');
      badge.className = 'badge badge-running';
      badge.textContent = 'running';
      try {
        const res = await fetch(`/api/projects/${projectId}/tickets/run`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ filename }),
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        startPolling();
      } catch (err) {
        alert('Error: ' + err.message);
        btn.disabled = false;
        btn.textContent = 'Run';
      }
    }

    function buildRunCard(run) {
      const card = document.createElement('div');
      card.className = 'run-card';
      card.id = `run-${run.run_id}`;
      const isPending = run.approved === 0;
      const branchBadge = run.branch
        ? `<span class="diff-branch-badge" title="Committed to this branch">${escHtml(run.branch)}</span>`
        : '';
      card.innerHTML = `
        <div class="run-header">
          <div>
            <div class="run-title">${escHtml(run.ticket_filename)}</div>
            <div class="run-date">${fmtDate(run.created_at)} · run #${run.run_id}</div>
            ${branchBadge}
          </div>
          ${verdictBadge(run.approved)}
        </div>

        ${run.planner_output != null ? `
        <div class="run-section-label" onclick="toggleSection(this, 'plan-${run.run_id}')">
          Plan ▶
        </div>
        <div id="plan-${run.run_id}" class="review-box" style="display:none">${escHtml(run.planner_output ?? '')}</div>
        ` : ''}

        <div class="run-section-label" onclick="toggleSection(this, 'dev-${run.run_id}')">
          Dev output ▶
        </div>
        <div id="dev-${run.run_id}" class="review-box" style="display:none">${escHtml(run.dev_output ?? '')}</div>

        ${run.diff ? `
        <div class="run-section-label diff-label" onclick="toggleSection(this, 'diff-${run.run_id}')">
          Git diff ▶
        </div>
        <div id="diff-${run.run_id}" class="diff-box" style="display:none"><pre>${escHtml(run.diff)}</pre></div>
        ` : ''}

        <div class="run-section-label" onclick="toggleSection(this, 'review-${run.run_id}')">
          Review ▶
        </div>
        <div id="review-${run.run_id}" class="review-box" style="display:none">${escHtml(run.review_output ?? '')}</div>

        <div class="btn-row" style="margin-top:12px">
          <button class="btn-approve" onclick="vote(${run.run_id}, 'approve', this)" ${isPending ? '' : 'disabled'}>
            Approve
          </button>
          <button class="btn-flag" onclick="vote(${run.run_id}, 'flag', this)" ${isPending ? '' : 'disabled'}>
            Flag
          </button>
        </div>
      `;
      return card;
    }

    function toggleSection(label, id) {
      const box = document.getElementById(id);
      const open = box.style.display !== 'none';
      box.style.display = open ? 'none' : '';
      label.textContent = label.textContent.replace(open ? '▼' : '▶', open ? '▶' : '▼');
    }

    async function vote(runId, action, btn) {
      btn.disabled = true;
      const card = document.getElementById(`run-${runId}`);
      card.querySelectorAll('button').forEach(b => b.disabled = true);

      if (action === 'flag') {
        btn.textContent = 'Flagging…';
      }

      try {
        const res = await fetch(`/api/runs/${runId}/${action}`, { method: 'POST' });
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        const badge = card.querySelector('.badge:last-of-type');
        if (action === 'approve') {
          badge.className = 'badge badge-approve'; badge.textContent = 'Approved';
        } else {
          badge.className = 'badge badge-flagged'; badge.textContent = 'Flagged';
        }

        if (action === 'flag' && data.spawned_tickets?.length) {
          const el = document.createElement('div');
          el.className = 'spawned-box';
          el.innerHTML = `
            <div class="spawned-title">Follow-up tickets created</div>
            ${data.spawned_tickets.map(f => `
              <div class="spawned-item">
                <span class="spawned-dot"></span>${escHtml(f)}
              </div>`).join('')}
          `;
          card.appendChild(el);
        }
      } catch (err) {
        alert('Error: ' + err.message);
        card.querySelectorAll('button').forEach(b => b.disabled = false);
      }
    }

    // ── Load ─────────────────────────────────────────────────────────────────

    async function load() {
      const res = await fetch(`/api/projects/${projectId}/runs`);
      const data = await res.json();
      if (data.error) { document.getElementById('loading').textContent = data.error; return; }

      document.getElementById('loading').remove();
      document.getElementById('content').style.display = '';

      const p = data.project;
      document.title = p.name;
      document.getElementById('project-name').textContent = p.name;
      document.getElementById('project-badge').outerHTML =
        `<span id="project-badge">${statusBadge(p.status)}</span>`;
      const ghLink = document.getElementById('project-github');
      ghLink.href = p.github_url; ghLink.textContent = p.github_url;
      if (p.description) document.getElementById('project-desc').textContent = p.description;

      renderBrief(data.brief, data.tree);
      renderTickets(data.tickets);
      renderRuns(data.runs);

      if (data.tickets.some(t => t.is_running)) startPolling();

      // Default tab: Runs if any exist, otherwise Brief
      if (data.runs.length) {
        document.querySelectorAll('.tab-btn')[2].click();
      }
    }

    load().catch(err => {
      document.getElementById('loading').textContent = 'Failed to load: ' + err.message;
    });
  </script>
</body>
</html>
